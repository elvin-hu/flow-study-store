<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - Headphones Shopping</title>
  <link rel="stylesheet" href="shared.css">
  <link rel="icon" type="image/svg+xml" href="favicon-headphones.svg">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">Headphones Shopping</a>
      <nav class="task-tabs">
        <a href="task-a/index.html" class="task-tab">Task A</a>
        <a href="task-b/index.html" class="task-tab">Task B</a>
        <a href="task-c/index.html" class="task-tab">Task C</a>
      </nav>
    </div>
  </header>

  <main class="main">
    <div class="breadcrumb"><a href="index.html">Home</a> / Checkout</div>
    <h1 class="page-title">Checkout</h1>
    <p class="page-subtitle">Complete your order below.</p>

    <div class="checkout-layout">
      <div class="order-summary">
        <h2>Order Summary</h2>
        <div class="item">
          <span id="summary-product">Product</span>
          <span id="summary-price">$0</span>
        </div>
        <div class="item">
          <span>Shipping</span>
          <span>Free</span>
        </div>
        <div class="item">
          <span>Tax</span>
          <span id="summary-tax">$0.00</span>
        </div>
        <div class="total">
          <span>Total</span>
          <span id="summary-total">$0.00</span>
        </div>
        <button class="btn btn-primary" onclick="placeOrder()">Place Order</button>
      </div>
    </div>
  </main>

  <footer class="footer">
    &copy; 2026 Headphones Shopping. This is a demo store for research purposes.
  </footer>

  <script>
    const params = new URLSearchParams(window.location.search);
    const product = params.get('product') || sessionStorage.getItem('cartProduct') || 'Unknown Product';
    const price = parseFloat(params.get('price') || sessionStorage.getItem('cartPrice') || '0');
    const tax = Math.round(price * 0.0875 * 100) / 100;
    const total = (price + tax).toFixed(2);

    document.getElementById('summary-product').textContent = product;
    document.getElementById('summary-price').textContent = '$' + price.toFixed(2);
    document.getElementById('summary-tax').textContent = '$' + tax.toFixed(2);
    document.getElementById('summary-total').textContent = '$' + total;

    function placeOrder() {
      window.location.href = 'order-confirmation.html?product=' + encodeURIComponent(product) + '&total=' + total;
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - SoundGear</title>
  <link rel="stylesheet" href="shared.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">SoundGear</a>
      <nav class="task-tabs">
        <a href="task-a/index.html" class="task-tab">Task A</a>
        <a href="task-b/index.html" class="task-tab">Task B</a>
        <a href="task-c/index.html" class="task-tab">Task C</a>
      </nav>
    </div>
  </header>

  <main class="main">
    <div class="breadcrumb"><a href="index.html">Home</a> / Checkout</div>
    <h1 class="page-title">Checkout</h1>
    <p class="page-subtitle">Complete your order below.</p>

    <div class="checkout-layout">
      <div class="form-section">
        <h2>Shipping Information</h2>
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="John Doe">
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="john@example.com">
        </div>
        <div class="form-group">
          <label for="address">Street Address</label>
          <input type="text" id="address" placeholder="123 Main Street">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="city">City</label>
            <input type="text" id="city" placeholder="San Francisco">
          </div>
          <div class="form-group">
            <label for="zip">Zip Code</label>
            <input type="text" id="zip" placeholder="94102">
          </div>
        </div>

        <h2 style="margin-top: 32px;">Payment Information</h2>
        <div class="form-group">
          <label for="card">Card Number</label>
          <input type="text" id="card" placeholder="4242 4242 4242 4242">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="expiry">Expiration Date</label>
            <input type="text" id="expiry" placeholder="MM / YY">
          </div>
          <div class="form-group">
            <label for="cvv">CVV</label>
            <input type="text" id="cvv" placeholder="123">
          </div>
        </div>
      </div>

      <div class="order-summary">
        <h2>Order Summary</h2>
        <div class="item">
          <span id="summary-product">Product</span>
          <span id="summary-price">$0</span>
        </div>
        <div class="item">
          <span>Shipping</span>
          <span>Free</span>
        </div>
        <div class="item">
          <span>Tax</span>
          <span id="summary-tax">$0.00</span>
        </div>
        <div class="total">
          <span>Total</span>
          <span id="summary-total">$0.00</span>
        </div>
        <button class="btn btn-primary" onclick="placeOrder()">Place Order</button>
      </div>
    </div>
  </main>

  <footer class="footer">
    &copy; 2026 SoundGear. This is a demo store for research purposes.
  </footer>

  <script>
    const params = new URLSearchParams(window.location.search);
    const product = params.get('product') || sessionStorage.getItem('cartProduct') || 'Unknown Product';
    const price = parseFloat(params.get('price') || sessionStorage.getItem('cartPrice') || '0');
    const tax = Math.round(price * 0.0875 * 100) / 100;
    const total = (price + tax).toFixed(2);

    document.getElementById('summary-product').textContent = product;
    document.getElementById('summary-price').textContent = '$' + price.toFixed(2);
    document.getElementById('summary-tax').textContent = '$' + tax.toFixed(2);
    document.getElementById('summary-total').textContent = '$' + total;

    function placeOrder() {
      window.location.href = 'order-confirmation.html?product=' + encodeURIComponent(product) + '&total=' + total;
    }
  </script>
</body>
</html>
